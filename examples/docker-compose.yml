services:
  orchestrator:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: uvicorn orchestrator.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - AGENT_URLS=http://estimating-agent:8001,http://supplier-agent:8002,http://rfi-agent:8003
    volumes:
      - ./orchestrator:/app/orchestrator
      - ./common:/app/common
      - ../assets:/app/assets:ro
    depends_on:
      - estimating-agent
      - supplier-agent
      - rfi-agent

  estimating-agent:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: uvicorn agents.estimating_agent:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - AGENT_HOST=estimating-agent
    volumes:
      - ./agents:/app/agents
      - ./common:/app/common

  supplier-agent:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: uvicorn agents.supplier_quote_agent:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - AGENT_HOST=supplier-agent
    volumes:
      - ./agents:/app/agents
      - ./common:/app/common

  rfi-agent:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    command: uvicorn agents.rfi_generation_agent:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - AGENT_HOST=rfi-agent
    volumes:
      - ./agents:/app/agents
      - ./common:/app/common
