[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caip"
version = "0.1.0"
description = "Construction A2A Interoperability Protocol — SDK"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/pelles-ai/caip"
Documentation = "https://caip.dev"
Repository = "https://github.com/pelles-ai/caip"
